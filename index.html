<!doctype html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Content Security Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' blob:;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: blob:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self';
        worker-src 'self' blob:;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />

    <!-- Primary Meta Tags -->
    <title>
      Tetenger - Solusi Penanda & Bukti Digital yang Autentik
    </title>

    <meta
      name="title"
      content="Tetenger - Solusi Penanda & Bukti Digital yang Autentik"
    />

    <meta
      name="description"
      content="Tambahkan tanda tangan dan stempel ke dokumen PDF dengan aman. Semua proses berjalan offline di browser Anda, menjamin privasi dokumen sensitif Anda."
    />

    <meta
      name="keywords"
      content="tanda tangan digital, PDF, stempel, paraf, dokumen, offline, privasi, aman, gratis, Indonesia"
    />

    <meta name="author" content="Tetenger" />

    <meta name="robots" content="index, follow" />

    <meta name="language" content="Indonesian" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <meta
      property="og:url"
      content="https://tetenger.com/"
    />

    <meta
      property="og:title"
      content="Tetenger - Solusi Penanda & Bukti Digital yang Autentik"
    />

    <meta
      property="og:description"
      content="Tambahkan tanda tangan dan stempel ke dokumen PDF dengan aman. Semua proses berjalan offline di browser Anda."
    />

    <meta
      property="og:image"
      content="https://tetenger.com/logo.png"
    />

    <meta property="og:locale" content="id_ID" />

    <meta property="og:site_name" content="Tetenger" />

    <!-- Twitter -->
    <meta
      property="twitter:card"
      content="summary_large_image"
    />

    <meta
      property="twitter:url"
      content="https://tetenger.com/"
    />

    <meta
      property="twitter:title"
      content="Tetenger - Solusi Penanda & Bukti Digital yang Autentik"
    />

    <meta
      property="twitter:description"
      content="Tambahkan tanda tangan dan stempel ke dokumen PDF dengan aman. Semua proses berjalan offline di browser Anda."
    />

    <meta
      property="twitter:image"
      content="https://tetenger.com/logo.png"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/tetenger-logo.png"
    />

    <link
      rel="apple-touch-icon"
      href="/logo.png"
    />

    <meta
      name="theme-color"
      content="#16a34a"
    />

    <!-- Canonical URL -->
    <link
      rel="canonical"
      href="https://tetenger.com/"
    />

    <!-- Theme Script -->
    <script>
      (function () {
        const storageKey = 'tetenger-theme';
        const theme =
          localStorage.getItem(storageKey) || 'dark';

        const root = document.documentElement;

        root.classList.remove('light', 'dark');

        if (theme === 'system') {
          const systemTheme = window.matchMedia(
            '(prefers-color-scheme: dark)'
          ).matches
            ? 'dark'
            : 'light';

          root.classList.add(systemTheme);
        } else {
          root.classList.add(theme);
        }
      })();
    </script>

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Tetenger - Solusi Penanda & Bukti Digital yang Autentik",
        "description": "Tambahkan tanda tangan dan stempel ke dokumen PDF dengan aman. Semua proses berjalan offline di browser Anda.",
        "url": "https://tetenger.com/",
        "image": "https://tetenger.com/logo.png",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "IDR"
        },
        "featureList": [
          "Tanda tangan digital PDF",
          "Stempel dokumen",
          "Pemrosesan offline",
          "Privasi terjamin"
        ],
        "inLanguage": "id"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
